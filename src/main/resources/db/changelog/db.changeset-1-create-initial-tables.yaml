databaseChangeLog:

  - changeSet:
      id: 1
      author: hwesselmann
      changes:
        - createTable:
            tableName: player
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dtbid
                  type: int
                  constraints:
                    - unique: true
              - column:
                  name: firstname
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: lastname
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: federation
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: club
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: nationality
                  type: varchar(3)
                  constraints:
                    nullable: false
        - createIndex:
            columns:
              - column:
                  name: dtbid
                  type: int
                  descending: false
            indexName: idx_dtbid_player
            tableName: player
            unique: true
        - createTable:
            tableName: ranking
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dtbid
                  type: int
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: agegroup
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: rank
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: score
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: agegroupranking
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: yobranking
                  type: boolean
                  constraints:
                    nullable: false
        - createIndex:
            columns:
              - column:
                  name: dtbid
                  type: int
              - column:
                  name: date
                  type: date
              - column:
                  name: rank
                  type: int
            indexName: idx_dtbid_date_rank_rankings
            tableName: ranking
            unique: false
        - createIndex:
            columns:
              - column:
                  name: dtbid
                  type: int
            indexName: idx_dtbid_rankings
            tableName: ranking
            unique: false
        - createTable:
            tableName: club
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dtbid
                  type: int
              - column:
                  name: club
                  type: varchar
                  constraints:
                    nullable: false
        - createIndex:
            columns:
              - column:
                  name: dtbid
                  type: int
            indexName: idx_dtbid_club
            tableName: club
            unique: false